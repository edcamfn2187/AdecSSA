version: '3.8'

services:
  db:
    image: postgres:14-alpine
    container_name: ebd-db
    restart: always
    environment:
      POSTGRES_USER: ebd_user
      POSTGRES_PASSWORD: ebd_password
      POSTGRES_DB: ebd_manager
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: ebd-app
    restart: always
    environment:
      DATABASE_URL: postgres://ebd_user:ebd_password@db:5432/ebd_manager
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
      NODE_ENV: production
      PORT: 3001
    expose:
      - "3001"
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: ebd-nginx
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - app

volumes:
  postgres_data:
